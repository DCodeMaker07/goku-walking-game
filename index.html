<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .personaje-activo {
            filter:
                drop-shadow(0 0 10px white) drop-shadow(0 0 20px white);
            height: 34rem;
            width: 34rem;
        }

        .ssj-activo {
            filter:
                drop-shadow(0 0 10px #fde047) drop-shadow(0 0 25px #facc15) drop-shadow(0 0 40px #eab308);
            height: 34rem;
            width: 34rem;
        }

        .texto-base-activado {
            filter:
                drop-shadow(0 0 10px white) drop-shadow(0 0 20px white);
        }

        .texto-ssj-activado {
            filter:
                drop-shadow(0 0 10px #fde047) drop-shadow(0 0 25px #facc15) drop-shadow(0 0 40px #eab308);
        }
    </style>
</head>

<body class="container mx-auto h-screen bg-zinc-800">
    <div class="grid grid-cols-1 lg:grid-cols-3 h-full">
        <div class="flex flex-col justify-center items-center">
            <img id="img-base" src="img/goku-base-prese.png"
                class="personaje-activo transition-all duration-300 w-[12rem] h-[32rem] lg:w-[28rem] lg:h-[28rem]"
                alt="goku-base">
            <p class="p-4 bg-zinc-500 shadow-md rounded-md font-bold text-zinc-50 transition-all duration-300" id="boton-base">
                G
            </p>
        </div>

        <div class="w-full h-full flex flex-col gap-y-12 justify-center items-center">
            <div class="rounded shadow-md" id="bloque_juego"></div>
            <div class="bg-zinc-100 rounded-md shadow-md p-4 transition-all duration-300 font-semibold" id="nombre-dev">
                Elio David
                Saavedra Sanchez - U22230980</div>
        </div>

        <div class="flex flex-col justify-center items-center">
            <img id="img-ssj" src="img/goku-ssj-prese.png"
                class="transition-all duration-300 w-[12rem] h-[32rem] lg:w-[28rem] lg:h-[28rem]" alt="goku-ssj">
            <p class="p-4 bg-zinc-500 shadow-md rounded-md font-bold text-zinc-50 transition-all duration-300" id="boton-ssj">
                F
            </p>
        </div>
    </div>

    <script src="js/phaser.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
